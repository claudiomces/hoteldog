<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Dog Recanto da Ilha - Em Breve!</title>
    <style>
        /* --- Paleta de Cores Baseada na Logo --- */
        :root {
            --bg-dark: #121212;
            --orange-main: #f27420;
            --green-light: #9ece3c;
            --green-dark: #009640;
            --text-white: #ffffff;
        }

        /* --- Configurações Gerais --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 1.5rem;
            
            /* Cursor customizado de patinha (SVG inline) */
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 24 24' fill='%23f27420'><path d='M12 14c-1.66 0-3 1.34-3 3 0 2 2 3.5 3 4s3-2 3-4c0-1.66-1.34-3-3-3zm-4.5-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm9 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-9.5-4c.83 0 1.5-.67 1.5-1.5S7.83 5 7 5s-1.5.67-1.5 1.5S6.17 7 7 7zm10 0c.83 0 1.5-.67 1.5-1.5S17.83 5 17 5s-1.5.67-1.5 1.5.67 1.5 1.5 1.5z'/></svg>") 16 16, auto;
        }

        /* Efeito de iluminação no fundo */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(35,35,35,1) 0%, rgba(18,18,18,1) 80%);
            z-index: 1;
        }

        /* --- Container Principal (Responsivo) --- */
        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 750px;
            width: 100%;
            animation: fadeIn 1s ease-out;
        }

        /* --- Texto Superior (Divertido) --- */
        .top-text {
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--green-light);
            text-shadow: 2px 3px 0px rgba(0,0,0,0.5);
            margin-bottom: 1.5rem;
            animation: bounce 3s infinite ease-in-out;
        }

        @media (max-width: 480px) {
            .top-text { font-size: 1.5rem; }
        }

        /* --- Box da Logo --- */
        .logo-box {
            position: relative;
            margin-bottom: 2rem;
            display: inline-block;
        }

        /* Brilho neon de fundo alternando cores */
        .logo-box::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 110%; height: 110%;
            background: linear-gradient(45deg, var(--orange-main), var(--green-dark));
            filter: blur(40px);
            opacity: 0.2;
            border-radius: 50%;
            z-index: -1;
            animation: pulseGlow 4s infinite alternate ease-in-out;
        }

        .logo-img {
            max-width: 100%;
            height: auto;
            width: 380px; /* Tamanho ideal para desktop */
            filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.6));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Interação alegre ao passar o mouse perto da logo */
        .logo-box:hover .logo-img {
            transform: scale(1.05) rotate(-2deg);
        }

        @media (max-width: 480px) {
            .logo-img { width: 260px; }
        }

        /* --- Card de Texto Inferior --- */
        .bottom-card {
            background: rgba(255, 255, 255, 0.04);
            border: 2px dashed rgba(158, 206, 60, 0.2); /* Borda tracejada divertida */
            padding: 2rem 2.5rem;
            border-radius: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-width: 90%;
        }

        .bottom-text {
            font-size: 1.3rem;
            line-height: 1.6;
            font-weight: 500;
            color: var(--text-white);
        }

        /* Destaca a última frase com degradê da marca */
        .highlight-phrase {
            display: block;
            margin-top: 0.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--orange-main), var(--green-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (max-width: 480px) {
            .bottom-card { padding: 1.5rem; }
            .bottom-text { font-size: 1.1rem; }
        }

        /* --- Elemento das Pegadas (Geradas por JS) --- */
        .paw-trail {
            position: absolute;
            width: 26px;
            height: 26px;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transform: translate(-50%, -50%);
            animation: printLife 3s forwards cubic-bezier(0.1, 0.8, 0.3, 1);
        }

        /* --- Animações CSS --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes pulseGlow {
            0% { opacity: 0.15; transform: translate(-50%, -50%) scale(0.95); }
            100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1.05); }
        }

        /* Animação que dita os 3 segundos exatos da pegada */
        @keyframes printLife {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
            10% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            75% { opacity: 0.6; } /* Segura a opacidade até 2.2 segundos */
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); } /* Desaparece suavemente em 3s */
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 class="top-text">Au au! Estamos trabalhando!!!</h1>

        <div class="logo-box">
            <img src="logo.png" alt="Logo Hotel Dog Recanto da Ilha" class="logo-img">
        </div>

        <div class="bottom-card">
            <p class="bottom-text">
                Estamos renovando nosso site e em breve 
                <span class="highlight-phrase">vocês terão uma experiência especial!</span>
            </p>
        </div>
    </div>

    <script>
        let lastX = 0;
        let lastY = 0;
        const minimumDistance = 45; // Distância em pixels para criar a próxima pegada
        let leftStep = true; 

        document.addEventListener('mousemove', (event) => {
            const currentX = event.clientX;
            const currentY = event.clientY;

            // Mede a distância percorrida pelo mouse
            const walkedDistance = Math.hypot(currentX - lastX, currentY - lastY);

            if (walkedDistance > minimumDistance) {
                spawnPaw(currentX, currentY);
                lastX = currentX;
                lastY = currentY;
            }
        });

        function spawnPaw(x, y) {
            const svgNS = "http://www.w3.org/2000/svg";
            const pawSvg = document.createElementNS(svgNS, "svg");
            
            pawSvg.setAttribute("class", "paw-trail");
            pawSvg.setAttribute("viewBox", "0 0 24 24");
            
            // Alterna a cor entre o Verde Limão e o Laranja vibrante da logo
            const stepColor = leftStep ? '#9ece3c' : '#f27420';
            
            // Desenho em vetor da patinha de cachorro
            pawSvg.innerHTML = `<path fill="${stepColor}" d="M12 14c-1.66 0-3 1.34-3 3 0 2 2 3.5 3 4s3-2 3-4c0-1.66-1.34-3-3-3zm-4.5-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm9 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-9.5-4c.83 0 1.5-.67 1.5-1.5S7.83 5 7 5s-1.5.67-1.5 1.5S6.17 7 7 7zm10 0c.83 0 1.5-.67 1.5-1.5S17.83 5 17 5s-1.5.67-1.5 1.5.67 1.5 1.5 1.5z"/>`;

            // Posiciona no local exato do cursor
            pawSvg.style.left = `${x}px`;
            pawSvg.style.top = `${y}px`;

            // Inclina levemente para simular passos esquerdo/direito
            const stepAngle = leftStep ? -20 : 20;
            pawSvg.style.transform = `translate(-50%, -50%) rotate(${stepAngle}deg)`;
            
            // Inverte para o próximo passo
            leftStep = !leftStep; 

            document.body.appendChild(pawSvg);

            // Deleta o elemento após 3 segundos para manter o navegador leve
            setTimeout(() => {
                pawSvg.remove();
            }, 3000);
        }
    </script>
</body>
</html>
