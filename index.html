<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Dog Recanto da Ilha - Em Breve</title>
    <style>
        /* --- Variáveis de Cores (Baseadas na Logo) --- */
        :root {
            --bg-color: #111111;
            --orange: #f27420;
            --green-light: #9ece3c;
            --green-dark: #009640;
            --text-white: #ffffff;
        }

        /* --- Estilos Gerais --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            /* Altera o cursor padrão para uma imagem de patinha (SVG inline) */
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 24 24' fill='%23f27420'><path d='M12 14c-1.66 0-3 1.34-3 3 0 2 2 3.5 3 4s3-2 3-4c0-1.66-1.34-3-3-3zm-4.5-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm9 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-9.5-4c.83 0 1.5-.67 1.5-1.5S7.83 5 7 5s-1.5.67-1.5 1.5S6.17 7 7 7zm10 0c.83 0 1.5-.67 1.5-1.5S17.83 5 17 5s-1.5.67-1.5 1.5.67 1.5 1.5 1.5z'/></svg>") 16 16, auto;
        }

        /* Fundo com leve textura/gradiente sutil para profundidade */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(40,40,40,1) 0%, rgba(17,17,17,1) 80%);
            z-index: 1;
        }

        /* --- Container Principal --- */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
        }

        /* --- Área da Logo --- */
        .logo-wrapper {
            margin-bottom: 2.5rem;
            position: relative;
            display: inline-block;
        }

        /* Efeito de brilho pulsante atrás da logo baseado nas cores do hotel */
        .logo-wrapper::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120%; height: 120%;
            background: linear-gradient(45deg, var(--orange), var(--green-light));
            filter: blur(50px);
            opacity: 0.15;
            border-radius: 50%;
            z-index: -1;
            animation: pulse 4s infinite alternate;
        }

        .logo-img {
            max-width: 280px;
            height: auto;
            /* Substitua pelo caminho real da sua imagem otimizada */
            border-radius: 12px; 
            transition: transform 0.5s ease;
        }

        /* Pequena reação da logo ao passar o mouse perto */
        .logo-wrapper:hover .logo-img {
            transform: scale(1.03) rotate(1deg);
        }

        /* --- Texto "Em Breve" --- */
        .message-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 2rem;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            animation: fadeInUp 1.2s ease-out;
        }

        .message-box p {
            font-size: 1.25rem;
            line-height: 1.6;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* Destaque colorido para o nome do hotel */
        .brand-highlight {
            display: block;
            margin-top: 1rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--orange), var(--green-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.4rem;
        }

        /* --- Efeito das Pegadas (Geradas por JS) --- */
        .paw-print {
            position: absolute;
            width: 24px;
            height: 24px;
            pointer-events: none; /* Garante que não trava o clique do mouse */
            z-index: 2;
            opacity: 0.45;
            transform: translate(-50%, -50%);
            animation: fadeOutTrail 3s forwards ease-in;
        }

        /* --- Animações --- */
        @keyframes pulse {
            0% { opacity: 0.1; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 0.22; transform: translate(-50%, -50%) scale(1.1); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* A pegada dura firme e começa a sumir (fade-out) em direção aos 3 segundos */
        @keyframes fadeOutTrail {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
            15% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            70% { opacity: 0.5; } /* Fica visível até 70% do tempo (aprox 2.1s) */
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } /* Some totalmente em 3s */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-wrapper">
            <img src="logo.png" alt="Hotel Dog Recanto da Ilha" class="logo-img">
        </div>

        <div class="message-box">
            <p>
                Estamos trabalhando para você ter a melhor experiência! 
                <span class="brand-highlight">Em breve, um novo website do Hotel Dog Recanto da Ilha</span>
            </p>
        </div>
    </div>

    /* --- Lógica das Pegadas Dinâmicas --- */
    <script>
        let lastX = 0;
        let lastY = 0;
        const distanceThreshold = 40; // Distância em pixels para soltar a próxima pegada (evita acumular demais)
        let isLeftPaw = true; // Alterna entre pata esquerda e direita para parecer que está andando

        document.addEventListener('mousemove', (e) => {
            const currentX = e.clientX;
            const currentY = e.clientY;

            // Calcula a distância do último ponto para criar um rastro espaçado natural
            const distance = Math.hypot(currentX - lastX, currentY - lastY);

            if (distance > distanceThreshold) {
                createPawPrint(currentX, currentY);
                lastX = currentX;
                lastY = currentY;
            }
        });

        function createPawPrint(x, y) {
            const paw = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            paw.setAttribute("class", "paw-print");
            paw.setAttribute("viewBox", "0 0 24 24");
            
            // Define a cor da pegada alternando sutilmente entre o verde e o laranja da marca
            const color = isLeftPaw ? '#9ece3c' : '#f27420';
            
            // SVG Interno da Patinha
            paw.innerHTML = `<path fill="${color}" d="M12 14c-1.66 0-3 1.34-3 3 0 2 2 3.5 3 4s3-2 3-4c0-1.66-1.34-3-3-3zm-4.5-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm9 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-9.5-4c.83 0 1.5-.67 1.5-1.5S7.83 5 7 5s-1.5.67-1.5 1.5S6.17 7 7 7zm10 0c.83 0 1.5-.67 1.5-1.5S17.83 5 17 5s-1.5.67-1.5 1.5.67 1.5 1.5 1.5z"/>`;

            // Posicionamento
            paw.style.left = `${x}px`;
            paw.style.top = `${y}px`;

            // Efeito de caminhada: rotaciona levemente para a esquerda ou direita dependendo do passo
            const angle = isLeftPaw ? -15 : 15;
            paw.style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;
            isLeftPaw = !isLeftPaw; // Alterna o pé

            document.body.appendChild(paw);

            // Remove o elemento do HTML após 3 segundos (tempo exato da animação CSS acabar)
            setTimeout(() => {
                paw.remove();
            }, 3000);
        }
    </script>
</body>
</html>
