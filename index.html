<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Dog - Em Manutenção</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- Configurações de Cores e Estilo Geral --- */
        :root {
            --orange: #f27420;
            --green: #9ece3c;
            --dark-overlay: rgba(18, 18, 18, 0.75);
            --card-bg: rgba(255, 255, 255, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Fundo com Imagens de Cachorros --- */
        /* Utiliza uma imagem pública de alta qualidade de cães correndo felizes */
        .bg-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1548199973-03cce0bbc87b?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            filter: blur(8px) scale(1.05); /* Desfoque para dar foco ao centro */
            z-index: 1;
        }

        /* Camada escura para garantir que os textos fiquem perfeitamente legíveis */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(18,18,18,0.6) 0%, var(--dark-overlay) 100%);
            z-index: 2;
        }

        /* --- Conteúdo Principal (Centralizado) --- */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2.5rem 2rem;
            max-width: 650px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: containerEntrance 1.2s ease-out;
        }

        /* --- Texto Superior --- */
        .top-text {
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--green);
            text-shadow: 2px 3px 0px rgba(0, 0, 0, 0.4);
            margin-bottom: 2rem;
            letter-spacing: 1px;
            animation: floatText 4s ease-in-out infinite;
        }

        /* --- Área da Logo --- */
        .logo-wrapper {
            margin-bottom: 2rem;
            position: relative;
        }

        /* Efeito de brilho pulsante sutil atrás da logo */
        .logo-wrapper::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 90%;
            background: linear-gradient(45deg, var(--orange), var(--green));
            filter: blur(35px);
            opacity: 0.3;
            border-radius: 50%;
            z-index: -1;
            animation: pulseGlow 3s infinite alternate ease-in-out;
        }

        .logo-img {
            max-width: 100%;
            height: auto;
            width: 340px; /* Tamanho ideal para destaque */
            filter: drop-shadow(0px 8px 16px rgba(0,0,0,0.5));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Interação ao passar o mouse perto da logo */
        .logo-wrapper:hover .logo-img {
            transform: scale(1.04) rotate(-1deg);
        }

        /* --- Texto Inferior --- */
        .bottom-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.8rem 2rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            margin-bottom: 2.5rem;
        }

        .bottom-text {
            font-size: 1.3rem;
            line-height: 1.5;
            font-weight: 500;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        /* Destaca o "Auuu!!!" com a cor laranja */
        .bark-highlight {
            color: var(--orange);
            font-weight: 700;
        }

        /* --- Redes Sociais e Contatos --- */
        .social-links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        .btn-social {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            text-decoration: none;
            font-size: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Cores de hover personalizadas para cada botão */
        .btn-social.instagram:hover {
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%);
            border-color: transparent;
            transform: translateY(-5px);
        }

        .btn-social.whatsapp:hover {
            background-color: #25D366;
            border-color: transparent;
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.4);
        }

        .btn-social.email:hover {
            background-color: var(--orange);
            border-color: transparent;
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(242, 116, 32, 0.4);
        }

        /* --- Responsividade (Telas Menores) --- */
        @media (max-width: 480px) {
            .top-text { font-size: 1.6rem; margin-bottom: 1.5rem; }
            .logo-img { width: 250px; }
            .bottom-card { padding: 1.2rem; }
            .bottom-text { font-size: 1.1rem; }
            .btn-social { width: 48px; height: 48px; font-size: 1.3rem; }
        }

        /* --- Animações --- */
        @keyframes containerEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        @keyframes pulseGlow {
            0% { opacity: 0.2; transform: translate(-50%, -50%) scale(0.95); }
            100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1.05); }
        }
    </style>
</head>
<body>

    <div class="bg-background"></div>
    <div class="bg-overlay"></div>

    <div class="container">
        
        <h1 class="top-text">Au au! Estamos em manutenção!</h1>

        <div class="logo-wrapper">
            <img src="logo.png" alt="Hotel Dog" class="logo-img">
        </div>

        <div class="bottom-card">
            <p class="bottom-text">
                Estamos criando um novo site, nos aguarde <span class="bark-highlight">Auuu!!!</span>
            </p>
        </div>

        <div class="social-links">
            <a href="https://www.instagram.com/hoteldogguriri/" target="_blank" rel="noopener" class="btn-social instagram" title="Siga nosso Instagram">
                <i class="fab fa-instagram"></i>
            </a>
            
            <a href="https://wa.me/5527999967767" target="_blank" rel="noopener" class="btn-social whatsapp" title="Fale no WhatsApp">
                <i class="fab fa-whatsapp"></i>
            </a>
            
            <a href="mailto:contato@hoteldog.com.br" class="btn-social email" title="Envie um E-mail">
                <i class="far fa-envelope"></i>
            </a>
        </div>

    </div>

</body>
</html>
