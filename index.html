<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Dog Guriri - Estamos em Manutenção</title>
    <!-- Fontes do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Poppins:wght@300;400;600&display=swap" rel="family">
    <!-- Font Awesome para Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #f39c12; /* Laranja caloroso / Sol */
            --secondary-color: #2980b9; /* Azul Mar */
            --accent-color: #e67e22; /* Tom complementar */
            --text-dark: #2c3e50;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            background: #f0f8ff;
        }

        /* Carrossel de Fundo (Imagens Praianas) */
        .bg-slider {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .bg-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            animation: fadeSlider 16s infinite ease-in-out;
            opacity: 0;
        }

        /* Alternância das imagens de cachorros na praia */
        .bg-slide:nth-child(1) {
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1548199973-03cce0bbc87b?auto=format&fit=crop&q=80&w=1920');
            animation-delay: 0s;
        }
        .bg-slide:nth-child(2) {
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1596492784531-6e6eb5ea9993?auto=format&fit=crop&q=80&w=1920');
            animation-delay: 4s;
        }
        .bg-slide:nth-child(3) {
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1534361960057-19889db9621e?auto=format&fit=crop&q=80&w=1920');
            animation-delay: 8s;
        }
        .bg-slide:nth-child(4) {
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1518717758536-85ae29035b6d?auto=format&fit=crop&q=80&w=1920');
            animation-delay: 12s;
        }

        @keyframes fadeSlider {
            0%, 20% { opacity: 1; }
            25%, 95% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* Container Central (Glassmorphism) */
        .maintenance-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            padding: 3rem 2rem;
            border-radius: 24px;
            width: 90%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            transform: translateY(0);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Textos */
        .top-text {
            font-family: 'Fredoka', sans-serif;
            font-size: 2rem;
            color: var(--secondary-color);
            margin-bottom: 1.5rem;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .bottom-text {
            font-size: 1.15rem;
            color: var(--text-dark);
            margin-top: 1.5rem;
            line-height: 1.6;
            font-weight: 400;
        }

        /* Espaço da Logo */
        .logo-wrapper {
            margin: 1rem auto;
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 220px;
            transition: transform 0.3s ease;
        }

        .logo-wrapper:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .logo-img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        /* Redes Sociais e Links */
        .social-links {
            margin-top: 2.5rem;
            display: flex;
            justify-content: center;
            gap: 1.2rem;
        }

        .social-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: var(--white);
            font-size: 1.4rem;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .social-btn.instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .social-btn.whatsapp { background-color: #25D366; }
        .social-btn.email { background-color: var(--secondary-color); }

        .social-btn:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Elementos Decorativos Extras (Pegadas) */
        .paws-decor {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 1.5rem;
            color: var(--primary-color);
            opacity: 0.7;
        }

        /* Responsividade */
        @media (max-width: 480px) {
            .top-text { font-size: 1.6rem; }
            .bottom-text { font-size: 1rem; }
            .maintenance-container { padding: 2rem 1.5rem; }
            .social-btn { width: 45px; height: 45px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <!-- Carrossel de fundo animado via CSS -->
    <div class="bg-slider">
        <div class="bg-slide"></div>
        <div class="bg-slide"></div>
        <div class="bg-slide"></div>
        <div class="bg-slide"></div>
    </div>

    <!-- Bloco de Conteúdo Principal -->
    <main class="maintenance-container">
        
        <h1 class="top-text">Au au! Estamos em manutenção!</h1>
        
        <div class="logo-wrapper">
            <!-- Sua imagem padrão configurada aqui -->
            <img src="logo.png" alt="Hotel Dog Guriri" class="logo-img">
        </div>
        
        <p class="bottom-text">Estamos criando um novo site, nos aguarde Auuu!!!</p>

        <div class="paws-decor">
            <i class="fa-solid fa-paw"></i>
            <i class="fa-solid fa-paw" style="transform: translateY(-5px);"></i>
            <i class="fa-solid fa-paw"></i>
        </div>

        <!-- Botões de Contato / Redes -->
        <div class="social-links">
            <a href="https://www.instagram.com/hoteldogguriri/" target="_blank" rel="noopener" class="social-btn instagram" title="Instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://wa.me/5527999967767" target="_blank" rel="noopener" class="social-btn whatsapp" title="WhatsApp">
                <i class="fa-brands fa-whatsapp"></i>
            </a>
            <a href="mailto:contato@hoteldog.com.br" class="social-btn email" title="E-mail">
                <i class="fa-solid fa-envelope"></i>
            </a>
        </div>

    </main>

</body>
</html>
